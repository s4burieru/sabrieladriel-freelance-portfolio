<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/output.css" />
    <title>Sabriel Adriel</title>
  </head>
  <body
    class="text-black bg-[#f8fafc] relative"
    style="
      background-color: #f8fafc;
      min-height: 100vh;
    "
  >
    <!-- Top Fade Grid Background -->
    <div
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 0;
        pointer-events: none;
        background-image: 
          linear-gradient(to right, #e2e8f0 1px, transparent 1px),
          linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
        background-size: 20px 30px;
        background-color: transparent;
        -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 0%, #000 60%, transparent 100%);
        mask-image: radial-gradient(ellipse 70% 60% at 50% 0%, #000 60%, transparent 100%);
      "
    ></div>
    <!-- Azure Depths Background -->
    <!-- Navbar Container -->
    <div id="navbar-container" style="position: relative; z-index: 10;"></div>

    <!-- Hero Section -->
    <section
      id="hero"
      class="flex items-center justify-center px-4 sm:px-6 md:px-8 pt-28 md:pt-12 lg:pt-0 relative z-10"
      style="min-height: 100vh"
    >
      <div
        class="grid grid-cols-1 md:grid-cols-3 gap-6 sm:gap-8 md:gap-12 items-center max-w-7xl"
      >
        <!-- Left Content -->
        <div class="md:col-span-2">
          <div
            class="inline-block bg-slate-100 text-slate-700 text-xs px-2 py-1 rounded-full mb-4 sm:mb-6 border border-slate-300 backdrop-blur-lg shadow-sm hover:border-slate-400 hover:bg-slate-200 transition"
          >
            Open to work!
          </div>

          <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold mb-3 sm:mb-4 text-slate-900">
            Hey, I'm Sabriel Adriel —
          </h1>

          <!-- Typing Animation Roles -->
          <div
            class="text-2xl sm:text-3xl md:text-4xl font-semibold text-slate-800 mb-6 sm:mb-8 h-10 sm:h-12"
          >
            <span>a </span><span id="role-text"></span
            ><span id="cursor" class="animate-blink">|</span>
          </div>

          <p
            class="text-base sm:text-lg md:text-xl text-slate-600 mb-5 sm:mb-10 leading-relaxed max-w-xl"
          >
            IT student and freelancer who is passionate about technology. I
            enjoy building, breaking, and solving the problems I encounter.
          </p>

          <!-- CTA Buttons -->
          <div
            class="flex flex-col sm:flex-row gap-4 sm:gap-5 mb-8 sm:mb-12 items-stretch sm:items-center w-full sm:w-auto"
          >
            <a
              href="mailto: savvv.business@gmail.com"
              class="w-full sm:w-40 px-4 sm:px-5 h-12 sm:h-14 border border-slate-300 rounded-full hover:border-slate-400 hover:bg-slate-100 transition backdrop-blur-lg bg-white shadow-sm flex items-center justify-center text-sm sm:text-base gap-2 text-slate-700"
            >
              <img src="./assets/icons/Envelope-Alt--Streamline-Unicons.svg" alt="Email" class="w-4 h-4" /> Get in touch
            </a>
            <a
              href="projects.html"
              class="w-full sm:w-52 px-5 sm:px-6 h-12 sm:h-14 bg-slate-900 text-white rounded-full hover:bg-slate-800 transition flex items-center justify-center text-sm sm:text-base gap-2"
            >
              <img src="./assets/icons/Bag-Alt--Streamline-Unicons.svg" alt="Projects" class="w-4 h-4 brightness-200" /> View my Projects
            </a>
          </div>
        </div>

        <!-- Right Image -->
        <div
          class="flex flex-col items-center gap-8 sm:gap-12 md:gap-16 order-first md:order-last md:col-span-1"
        >
          <div class="relative">
            <div
              class="w-32 sm:w-40 md:w-48 h-32 sm:h-40 md:h-48 rounded-full border-4 border-white overflow-hidden bg-gray-800 flex items-center justify-center"
            >
              <img
                src="./assets/images/my-picture.jpg"
                alt="Sabriel Adriel"
                class="w-full h-full object-cover"
              />
            </div>
          </div>

          <!-- Social Icons -->
          <div class="flex gap-2 sm:gap-3 justify-center flex-wrap">
            <a
              href="https://github.com/s4burieru"
              class="w-12 sm:w-14 h-12 sm:h-14 bg-white/10 border border-white/10 rounded-lg flex items-center justify-center hover:bg-white/20 hover:border-white/40 transition backdrop-blur-lg shadow-sm"
              title="GitHub"
              ><img src="./assets/icons/Github--Streamline-Feather.svg" alt="GitHub" class="w-4 sm:w-5 h-4 sm:h-5" /></a
            >
            <a
              href="https://www.linkedin.com/in/sabrieladriel/"
              class="w-12 sm:w-14 h-12 sm:h-14 bg-white/10 border border-white/10 rounded-lg flex items-center justify-center hover:bg-white/20 hover:border-white/40 transition backdrop-blur-lg shadow-sm"
              title="LinkedIn"
              ><img src="./assets/icons/Linkedin--Streamline-Feather.svg" alt="LinkedIn" class="w-4 sm:w-5 h-4 sm:h-5" /></a
            >
            <a
              href="https://behance.net/sabrieladriel"
              class="w-12 sm:w-14 h-12 sm:h-14 bg-white/10 border border-white/10 rounded-lg flex items-center justify-center hover:bg-white/20 hover:border-white/40 transition backdrop-blur-lg shadow-sm"
              title="Behance"
              ><img src="./assets/icons/Behance-Tag--Streamline-Iconoir.svg" alt="Behance" class="w-4 sm:w-5 h-4 sm:h-5" /></a
            >
            <a
              href="https://medium.com/@sabrieladriel"
              class="w-12 sm:w-14 h-12 sm:h-14 bg-white/10 border border-white/10 rounded-lg flex items-center justify-center hover:bg-white/20 hover:border-white/40 transition backdrop-blur-lg shadow-sm"
              title="Medium"
              ><img src="./assets/icons/Medium--Streamline-Iconoir.svg" alt="Medium" class="w-4 sm:w-5 h-4 sm:h-5" /></a
            >
            <a
              href="https://www.instagram.com/s4burieru_/"
              class="w-12 sm:w-14 h-12 sm:h-14 bg-white/10 border border-white/10 rounded-lg flex items-center justify-center hover:bg-white/20 hover:border-white/40 transition backdrop-blur-lg shadow-sm"
              title="Instagram"
              ><img src="./assets/icons/Instagram--Streamline-Feather.svg" alt="Instagram" class="w-4 sm:w-5 h-4 sm:h-5" /></a
            >
          </div>
        </div>
      </div>
    </section>
    <script src="./js/main.js"></script>
  </body>
</html>
