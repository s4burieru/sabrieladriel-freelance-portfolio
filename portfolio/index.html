<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/output.css" />
    <title>Sabriel Adriel</title>
  </head>
  <body class="bg-slate-900 text-white">
    <!-- Hero Section -->
    <section class="px-4 sm:px-6 md:px-8 py-12 sm:py-16 md:py-24 max-w-7xl mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8 md:gap-12 items-center">
        <!-- Left Content -->
        <div>
          <div
            class="inline-block bg-blue-600 text-xs px-2 py-1 rounded-full mb-4 sm:mb-6"
          >
            Open to work!
          </div>

          <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold mb-3 sm:mb-4">
            Hey, I'm Sabriel Adriel —
          </h1>

          <!-- Typing Animation Roles -->
          <div class="text-2xl sm:text-3xl md:text-4xl font-semibold text-blue-400 mb-6 sm:mb-8 h-10 sm:h-12">
            <span>a </span><span id="role-text"></span><span id="cursor" class="animate-blink">|</span>
          </div>

          <p class="text-base sm:text-lg md:text-xl text-gray-400 mb-6 sm:mb-8 leading-relaxed">
            IT Student and freelancer who deeply likes technology
            stuffs. I like building, breaking, and solving problems I encounter.
          </p>

          <!-- CTA Buttons -->
          <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 mb-8 sm:mb-12 items-stretch sm:items-center">
            <a
              href="contact.html"
              class="px-6 sm:px-8 h-12 sm:h-14 border border-gray-500 rounded-full hover:border-blue-400 hover:text-blue-400 transition flex items-center justify-center text-sm sm:text-base"
            >
              ✉️ Get in touch
            </a>
            <a
              href="#"
              class="px-6 sm:px-8 h-12 sm:h-14 bg-blue-600 rounded-full hover:bg-blue-700 transition flex items-center justify-center text-sm sm:text-base"
            >
              💬 View my Projects
            </a>
          </div>
        </div>

        <!-- Right Image -->
        <div class="flex flex-col items-center gap-8 sm:gap-12 md:gap-16 order-first md:order-last">
          <div class="relative">
            <div
              class="w-32 sm:w-40 md:w-48 h-32 sm:h-40 md:h-48 rounded-full border-4 border-blue-400 overflow-hidden bg-gray-800 flex items-center justify-center"
            >
              <img
                src="./assets/images/hero/my-picture.jpg"
                alt="Sabriel Adriel"
                class="w-full h-full object-cover"
              />
            </div>
          </div>

          <!-- Social Icons -->
          <div class="flex gap-2 sm:gap-3 justify-center flex-wrap">
            <a
              href="#"
              class="w-12 sm:w-14 h-12 sm:h-14 bg-gray-800 rounded-lg flex items-center justify-center hover:bg-gray-700 transition text-lg sm:text-xl"
              >🐙</a
            >
            <a
              href="#"
              class="w-12 sm:w-14 h-12 sm:h-14 bg-gray-800 rounded-lg flex items-center justify-center hover:bg-gray-700 transition text-lg sm:text-xl"
              >💼</a
            >
            <a
              href="#"
              class="w-12 sm:w-14 h-12 sm:h-14 bg-gray-800 rounded-lg flex items-center justify-center hover:bg-gray-700 transition text-lg sm:text-xl"
              >📷</a
            >
            <a
              href="#"
              class="w-12 sm:w-14 h-12 sm:h-14 bg-gray-800 rounded-lg flex items-center justify-center hover:bg-gray-700 transition text-lg sm:text-xl"
              >💬</a
            >
            <a
              href="#"
              class="w-12 sm:w-14 h-12 sm:h-14 bg-gray-800 rounded-lg flex items-center justify-center hover:bg-gray-700 transition text-lg sm:text-xl"
              >📧</a
            >
          </div>
        </div>
      </div>
    </section>
    <script src="./js/main.js"></script>
  </body>
</html>
